{% extends "myapp/layout/layout.html" %}

{% block content %}

<div class="min-vh-100 d-flex align-items-center justify-content-center m-5" >
    <div class="col-md-5 col-lg-4 p-4 rounded-4 shadow-lg featuredSectioncard1" style="background-color:#1a1a1a" >

        {% comment %} <h2 class="text-center mb-4 fw-bold" style="color: #EA2264;">Finance Tracker</h2> {% endcomment %}
        {{form.errors}}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3 row">
                <label for="title" class="form-label regFormInput fw-semibold col-sm-3" required>Title</label>
                <div class="col-sm-9">
                    <input type="text" class="form-control gradient-input text-light" id="title" name="title" placeholder="Python/music, etc." >
                </div>
            </div>

            <div class="mb-3 row">
                <label for="category" class="form-label regFormInput fw-semibold col-sm-3">Category:</label>
                <div class="col-sm-9">
                    <input type="text" class="form-control gradient-input text-light" id="category" name="category" placeholder="Programming/Design, etc.">
                </div>
            </div>

            <div class="mb-3 row">
                <label for="description" class="form-label regFormInput fw-semibold col-sm-3">Description:</label>
                <div class="col-sm-9">
                    <input type="text" class="form-control gradient-input text-light" id="description" name="description" placeholder="What you want to teach?">
                </div>
            </div>

            <div class="mb-3 row">
                <label for="experience_level" class="form-label regFormInput fw-semibold col-sm-3">Experience Level:</label>
                <div class="col-sm-9">
                    <select name="experience_level" id="experience_level" class="form-control gradient-input text-light">
                        <option value="" disabled selected hidden>----------</option>
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="expert">Expert</option>
                    </select>
                </div>
            </div>

            <div class="mb-3 row">
                <label for="years_of_experience" class="form-label regFormInput fw-semibold col-sm-3">Years Of Experience:</label>
                <div class="col-sm-9">
                    <input type="text" class="form-control gradient-input text-light" id="years_of_experience" name="years_of_experience" placeholder="1/5/10, etc." >
                </div>
            </div>

            <div class="mb-3 row">
                <label for="availability" class="form-label regFormInput fw-semibold col-sm-3">Availability:</label>
                <div class="col-sm-9">
                    <select name="availability" id="availability" class="form-control gradient-input text-light">
                        <option value="" disabled selected hidden>----------</option>
                        <option value="weekends">Weekends</option>
                        <option value="weekdays">Weekdays</option>
                        <option value="flexible">Flexible</option>
                    </select>
                </div>
            </div>

            <div class="mb-3 row">
                <label for="preferred_mode" class="form-label regFormInput fw-semibold col-sm-3">Preferred Mode:</label>
                <div class="col-sm-9">
                    <select name="preferred_mode" id="preferred_mode" class="form-control gradient-input text-light">
                        <option value="" disabled selected hidden>----------</option>
                        <option value="online">Online</option>
                        <option value="offline">Offline</option>
                        <option value="both">Both</option>
                    </select>
                </div>
            </div>

            <div class="mb-3 row">
                <label for="price_type" class="form-label regFormInput fw-semibold col-sm-3">Price Type:</label>
                <div class="col-sm-9">
                    <select name="price_type" id="price_type" class="form-control gradient-input text-light">
                        <option value="" disabled selected hidden>----------</option>
                        <option value="free">Free</option>
                        <option value="paid">Paid</option>
                        <option value="exchange-skills">Exchange Skills</option>
                    </select>
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn-outline-warning fw-semibold px-5 py-2 form-control w-auto d-inline-block">Add Skill</button>
            </div>
        </form>
    </div>
</div>

{% endblock content %}
